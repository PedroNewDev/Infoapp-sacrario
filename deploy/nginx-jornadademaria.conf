server {
    listen 80;
    server_name jornadademaria.online www.jornadademaria.online;

    root /www/wwwroot/jornadademaria.online;
    index index.html;

    # Áudios servidos direto pelo Nginx (sem passar pelo Node)
    location /media/audio/ {
        alias /www/wwwroot/jornadademaria.online/media/audio/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Accept-Ranges bytes;
        types { audio/mpeg mp3; }
    }

    # API → proxy para o backend Node na porta 3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # SPA React — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Assets estáticos do build (JS/CSS/imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\.(env|git|htaccess) {
        deny all;
    }
}
